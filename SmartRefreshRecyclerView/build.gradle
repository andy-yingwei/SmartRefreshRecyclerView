plugins {
    id 'com.android.library'
    // 这是 Gradle 官方推荐的发布插件，它提供了 publishToMavenLocal任务。JitPack 正是靠这个任务来获取 AAR 文件
    id 'maven-publish'
}

android {
    namespace 'com.example.smartrefreshrecyclerview'
    compileSdk 35

    defaultConfig {
        minSdk 24
        versionCode 1
        versionName "1.0.0"   // ✅ 与 Git Tag 对应
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // 用 implementation（最终会打进 AAR）
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.recyclerview:recyclerview:1.3.2"
    implementation "in.srain.cube:ultra-ptr:1.0.11"
}

// 确保在 Gradle 配置解析完成后才执行发布配置，避免变量未初始化
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release  //指定发布的是 Release 变体，这是 Android Library 的标准发布方式

                groupId = 'com.github.andy-yingwei'
                artifactId = 'SmartRefreshRecyclerView'
                version = 'v1.0.0'
            }
        }
    }
}